<label for="fecha">Selecciona tu cita:</label>
<select name="disponibilidadId" required>
    <option value="" disabled selected>-- Elige un día y hora --</option>

            th:value="${h.id}" 
            th:text="${#temporals.format(h.fechaHora, 'dd/MM/yyyy HH:mm')}">

</select>
