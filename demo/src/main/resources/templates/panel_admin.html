<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <h1>Gestión de Citas</h1>

<div style="margin-bottom: 30px; padding: 15px; border: 1px solid #ccc;">
    <h3>Añadir nuevo hueco libre</h3>
    <form action="/admin/agregar-fecha" method="post">
        <input type="datetime-local" name="fechaHora" required>
        <button type="submit">Publicar hueco</button>
    </form>
</div>

   <table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Instagram</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="cita : ${citas}">
            <td th:text="${cita.id}"></td>
            <td th:text="${cita.fechaCita}"></td>
            <td th:text="${cita.estado}"></td>
            <td th:text="${cita.usuario != null ? cita.usuario.nombre : 'N/A'}"></td>
            <td th:text="${cita.usuario != null ? cita.usuario.apellidos : 'N/A'}"></td>
            <td th:text="${cita.usuario != null ? cita.usuario.telefono : 'N/A'}"></td>
            <td th:text="${cita.usuario != null ? cita.usuario.email : 'N/A'}"></td>
            <td th:text="${cita.usuario != null ? cita.usuario.instagram : 'N/A'}"></td>
        </tr>
    </tbody>
</table>
</body>
</html>
