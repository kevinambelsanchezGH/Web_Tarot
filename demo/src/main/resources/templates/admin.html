<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Tarot</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <style>
        body { background: #0f0c29; color: gold; font-family: 'Segoe UI', sans-serif; }
        .container { width: 90%; margin: 50px auto; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(255, 255, 255, 0.05); }
        th, td { padding: 15px; border: 1px solid gold; text-align: left; }
        th { background: rgba(212, 175, 55, 0.2); }
        tr:hover { background: rgba(212, 175, 55, 0.1); }
        .insta-link { color: #e1306c; text-decoration: none; font-weight: bold; }
        h1 { text-shadow: 0 0 10px gold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Gestión de Citas Místicas</h1>
        <p>Aquí puedes ver quién ha solicitado una lectura de cartas:</p>
        
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Instagram</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cita : ${citas}">
                    <td th:text="${cita.nombre}">Nombre</td>
                    <td th:text="${cita.apellidos}">Apellidos</td>
                    <td>
                        <a th:href="'https://instagram.com/' + ${cita.instagram}" 
                           th:text="'@' + ${cita.instagram}" class="insta-link" target="_blank">@insta</a>
                    </td>
                    <td th:text="${cita.telefono}">600000000</td>
                    <td th:text="${cita.email}">email@test.com</td>
                </tr>
            </tbody>
        </table>
        
        <br>
        <a href="/" style="color: white;">⬅️ Volver a la web principal</a>
    </div>
</body>
</html>
